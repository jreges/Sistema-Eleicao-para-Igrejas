<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eleição de Oficiais da Igreja</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg,#f0ede6);color:var(--tx,#1a1a18);min-height:100vh}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:380px}
.container{width:100%;max-width:760px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px;margin-bottom:12px}
.card-sm{background:#fff;border:1px solid #eee;border-radius:10px;padding:10px 14px}
.field{margin-bottom:12px}
.field label{font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:600}
.input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a18;font-size:14px;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--p,#185FA5);box-shadow:0 0 0 3px rgba(24,95,165,.07)}
select.input{cursor:pointer}
textarea.input{resize:vertical}
.cpf-ok{border-color:#3B6D11!important}
.cpf-err{border-color:#a32d2d!important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #ccc;background:#f5f5f5;color:#333;transition:all .15s;white-space:nowrap;cursor:pointer}
.btn:hover{filter:brightness(.95)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-full{width:100%;padding:10px;justify-content:center}
.btn-p{background:var(--pbg,#e6f1fb);color:var(--p,#185FA5);border-color:var(--p,#185FA5)}
.btn-s{background:var(--sbg,#eaf3de);color:var(--s,#3B6D11);border-color:var(--s,#3B6D11)}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:#a32d2d}
.btn-warn{background:#faeeda;color:#854F0B;border-color:#854F0B}
.btn-sm{padding:4px 9px;font-size:12px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px}
.bdg-ok{background:#eaf3de;color:#3B6D11}
.bdg-err{background:#fcebeb;color:#a32d2d}
.bdg-warn{background:#faeeda;color:#854F0B}
.bdg-gray{background:#eee;color:#666}
.bdg-info{background:var(--pbg,#e6f1fb);color:var(--p,#185FA5)}
.divider{height:1px;background:#eee;margin:14px 0}
.err-box{background:#fcebeb;color:#a32d2d;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.info-box{background:var(--pbg,#e6f1fb);color:var(--p,#185FA5);font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.warn-box{background:#faeeda;color:#854F0B;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.succ-box{background:#eaf3de;color:#3B6D11;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.tabs{background:#fff;border-bottom:1px solid #ddd;display:flex;overflow-x:auto;padding:0 8px}
.tabs::-webkit-scrollbar{height:0}
.tab-btn{padding:10px 12px;font-size:13px;background:transparent;border:none;border-bottom:2px solid transparent;color:#888;font-weight:400;white-space:nowrap;cursor:pointer;transition:all .15s}
.tab-btn.active{color:var(--p,#185FA5);font-weight:700;border-bottom-color:var(--p,#185FA5)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;animation:tIn .25s ease;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.12)}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:1000}
.topbar{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px 14px}
.stat-card .lbl{font-size:11px;color:#888;margin-bottom:2px}
.stat-card .val{font-size:26px;font-weight:700}
.pres-item{display:flex;align-items:center;gap:10px;border-radius:10px;padding:9px 13px;margin-bottom:6px;cursor:pointer;transition:all .15s;border:1px solid #ddd;background:#fff}
.pres-item.p{background:#eaf3de;border-color:#3B6D11}
.spinner{width:24px;height:24px;border:3px solid #e0ddd6;border-top-color:var(--p,#185FA5);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
/* User list row */
.u-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #eee;border-radius:10px;padding:9px 13px;margin-bottom:6px;transition:all .15s}
.u-row.sel{background:var(--pbg,#e6f1fb);border-color:var(--p,#185FA5)}
</style>
</head>
<body>
<div id="app"><div class="page"><div class="spinner"></div></div></div>

<script>
// ─── Sessão (sessionStorage — limpo ao fechar a aba) ─────────────────────────
function getToken(){ return sessionStorage.getItem('adminToken')||''; }
function getRole() { return sessionStorage.getItem('adminRole')||''; }
function saveSession(token,role){ sessionStorage.setItem('adminToken',token); sessionStorage.setItem('adminRole',role); }
function clearSession(){ sessionStorage.removeItem('adminToken'); sessionStorage.removeItem('adminRole'); }

// ─── API ──────────────────────────────────────────────────────────────────────
function authH(){ return {'X-Admin-Token':getToken()}; }
function authJ(){ return {'Content-Type':'application/json','X-Admin-Token':getToken()}; }

const api = {
  get:     async p      => (await fetch(p,{headers:authH()})).json(),
  post:    async (p,d)  => (await fetch(p,{method:'POST',  headers:authJ(),body:JSON.stringify(d)})).json(),
  patch:   async (p,d)  => (await fetch(p,{method:'PATCH', headers:authJ(),body:JSON.stringify(d)})).json(),
  del:     async p      => (await fetch(p,{method:'DELETE',headers:authH()})).json(),
  postTxt: async (p,t)  => (await fetch(p,{method:'POST',  headers:authJ(),body:JSON.stringify({csv:t})})).json(),
  upload:  async (p,k,f)=> { const fd=new FormData(); fd.append(k,f); return (await fetch(p,{method:'POST',headers:authH(),body:fd})).json(); },
};

// ─── Download helper (fetch+blob — garante envio do token) ───────────────────
async function downloadFile(url, filename){
  try{
    const resp = await fetch(url, {headers: authH()});
    if(!resp.ok){
      let msg = 'Erro HTTP '+resp.status;
      try{ const j=await resp.json(); msg=j.error||msg; }catch{}
      toast(msg,'danger'); return;
    }
    const blob = await resp.blob();
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=objUrl; a.download=filename; a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(objUrl); },300);
    toast('Download: '+filename,'success');
  }catch(e){ console.error(e); toast('Erro ao baixar arquivo.','danger'); }
}
function exportarCSV()       { downloadFile('/api/usuarios/exportar','eleitores.csv'); }
function exportarPresenca()  { downloadFile('/api/presenca/exportar-xlsx','lista-presenca.xlsx'); }
function exportarResultado() { downloadFile('/api/resultados/exportar-xlsx','resultado-eleicao.xlsx'); }

// ─── Estado UI ────────────────────────────────────────────────────────────────
let S = { tab:'usuarios', users:[], candidatos:[], cargos:[], presentes:[], jaVotou:[], elStatus:'aguardando', config:{} };
let _pollTimer = null;

// ─── Utilitários ─────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtCPF = v => v.replace(/\D/g,'').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4').slice(0,14);

function validCPF(cpf){
  cpf=cpf.replace(/\D/g,'');
  if(cpf.length!==11||/^(\d)\1{10}$/.test(cpf))return false;
  let s=0;for(let i=0;i<9;i++)s+=+cpf[i]*(10-i);let r=(s*10)%11;if(r>=10)r=0;if(r!==+cpf[9])return false;
  s=0;for(let i=0;i<10;i++)s+=+cpf[i]*(11-i);r=(s*10)%11;if(r>=10)r=0;return r===+cpf[10];
}

let _tTimer=null;
function toast(msg,type='info'){
  document.querySelector('.toast')?.remove();
  if(_tTimer)clearTimeout(_tTimer);
  const el=document.createElement('div'); el.className='toast';
  const st={info:'background:var(--pbg);color:var(--p);border:1px solid var(--p)',success:'background:#eaf3de;color:#3B6D11;border:1px solid #3B6D11',warn:'background:#faeeda;color:#854F0B;border:1px solid #854F0B',danger:'background:#fcebeb;color:#a32d2d;border:1px solid #a32d2d'};
  el.style.cssText=st[type]||st.info; el.textContent=msg; document.body.appendChild(el);
  _tTimer=setTimeout(()=>el.remove(),3400);
}

function applyTheme(c){
  if(!c)return;
  const p=c.corPrimaria||'#185FA5',s=c.corSecundaria||'#3B6D11';
  const hexBg=h=>{try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},.1)`;}catch{return'rgba(24,95,165,.1)';}};
  document.documentElement.style.setProperty('--p',p);
  document.documentElement.style.setProperty('--s',s);
  document.documentElement.style.setProperty('--pbg',hexBg(p));
  document.documentElement.style.setProperty('--sbg',hexBg(s));
  document.documentElement.style.setProperty('--bg',c.corFundo||'#f0ede6');
  document.documentElement.style.setProperty('--tx',c.corTexto||'#1a1a18');
  document.body.style.background=c.corFundo||'#f0ede6';
}

function avHTML(c,sz){
  if(!c)return'';
  if(c.fotoUrl)
    return`<img src="${esc(c.fotoUrl)}" style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #ddd" onerror="this.style.display='none'">`;
  return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:#f0ede6;display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*.4)}px;flex-shrink:0">😊</div>`;
}

async function loadState(){
  const d=await api.get('/api/state');
  S.users=d.users||[];S.candidatos=d.candidatos||[];S.cargos=d.cargos||[];
  S.presentes=d.presentes||[];S.jaVotou=d.jaVotou||[];S.elStatus=d.elStatus||'aguardando';S.config=d.config||{};
  applyTheme(S.config);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async()=>{
  await loadState();
  const saved=getToken();
  if(saved){
    const chk=await api.get('/api/auth/check');
    if(chk.valid){renderAdmin();return;}
    clearSession();
  }
  renderLogin();
})();

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function renderLogin(){
  const c=S.config;
  const sb=S.elStatus==='ativa'?'<span class="badge bdg-ok">Eleição em andamento</span>':S.elStatus==='encerrada'?'<span class="badge bdg-warn">Eleição encerrada</span>':'<span class="badge bdg-gray">Aguardando</span>';
  $('app').innerHTML=`
  <div class="page"><div class="wrap">
    <div style="text-align:center;margin-bottom:22px">
      ${c.logoUrl?`<img src="${esc(c.logoUrl)}" style="max-height:60px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto">`:'<div style="font-size:52px;margin-bottom:10px">🗳️</div>'}
      <h1 style="font-size:21px;font-weight:700">${esc(c.nomeInstituicao||'Eleição de Oficiais da Igreja')}</h1>
      <p style="font-size:13px;color:#888;margin-top:5px">Painel Administrativo</p>
    </div>
    <div class="card">
      <div class="field"><label>Usuário</label><input id="l-cpf" class="input" placeholder="admin" autocomplete="username"></div>
      <div class="field"><label>Senha</label><input id="l-pwd" class="input" type="password" placeholder="••••••" autocomplete="current-password"></div>
      <div id="l-err" style="display:none" class="err-box"></div>
      <button class="btn btn-p btn-full" onclick="doLogin()">Entrar no painel</button>
      <div style="margin-top:12px;padding:10px;background:var(--bg,#f0ede6);border-radius:8px;font-size:11px;color:#888;line-height:2">
        <a href="/votar"   style="color:var(--p)" target="_blank">🗳️ Votação</a> &nbsp;·&nbsp;
        <a href="/checkin" style="color:var(--p)" target="_blank">📷 Check-in</a> &nbsp;·&nbsp;
        <a href="/datashow" style="color:var(--p)" target="_blank">📺 Datashow</a>
      </div>
    </div>
    <div style="text-align:center;margin-top:10px">${sb}</div>
  </div></div>`;
  const li=$('l-cpf'),lp=$('l-pwd');
  if(li)li.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  if(lp)lp.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

async function doLogin(){
  const cpf=($('l-cpf').value||'').trim(),pwd=$('l-pwd').value;
  const e=$('l-err');e.style.display='none';
  if(!cpf){e.textContent='Digite o usuário.';e.style.display='block';return;}
  const res=await api.post('/api/login',{cpf,pwd});
  if(res.error){e.textContent=res.error;e.style.display='block';return;}
  saveSession(res.token,res.role);
  await loadState();renderAdmin();
}

// ─── ADMIN SHELL ──────────────────────────────────────────────────────────────
function renderAdmin(){
  const st=S.elStatus;
  const sb=st==='ativa'?'<span class="badge bdg-ok">Ativa</span>':st==='encerrada'?'<span class="badge bdg-warn">Encerrada</span>':'<span class="badge bdg-gray">Aguardando</span>';
  const tabs=[['usuarios','Membros'],['presenca','Presença'],['candidatos','Candidatos'],['cargos','Cargos'],['eleicao','Eleição'],['resultados','Resultados'],['configuracoes','Configurações']];
  const th=tabs.map(([id,lbl])=>`<button class="tab-btn ${S.tab===id?'active':''}" onclick="setTab('${id}')">${lbl}</button>`).join('');
  $('app').innerHTML=`
  <div style="min-height:100vh;background:var(--bg,#f0ede6)">
    <div class="topbar">
      ${S.config.logoUrl?`<img src="${esc(S.config.logoUrl)}" style="height:26px">`:'<span style="font-size:18px">🗳️</span>'}
      <span style="font-weight:700;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(S.config.nomeInstituicao||'Eleição de Oficiais da Igreja')}</span>
      ${sb}
      <div style="display:flex;gap:6px;margin-left:8px">
        <a class="btn btn-sm btn-p" href="/votar" target="_blank">🗳️</a>
        <a class="btn btn-sm" href="/datashow" target="_blank">📺</a>
        <button class="btn btn-sm" onclick="doLogout()">Sair</button>
      </div>
    </div>
    <div class="tabs">${th}</div>
    <div id="tab-content" class="container" style="padding-top:20px"></div>
  </div>`;
  renderTab();
}

async function setTab(id){
  S.tab=id;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const labels={usuarios:'Membros',presenca:'Presença',candidatos:'Candidatos',cargos:'Cargos',eleicao:'Eleição',resultados:'Resultados',configuracoes:'Configurações'};
    b.classList.toggle('active',b.textContent===labels[id]);
  });
  if(id!=='eleicao')stopPoll();
  await renderTab();
}

async function renderTab(){
  await loadState();
  const el=$('tab-content');if(!el)return;
  const fn={usuarios:tabUsuarios,presenca:tabPresenca,candidatos:tabCandidatos,cargos:tabCargos,eleicao:tabEleicao,resultados:tabResultados,configuracoes:tabConfig}[S.tab];
  if(fn){ const html=await fn(); el.innerHTML=html; }
  bindTabEvents();
  if(S.tab==='eleicao'&&S.elStatus==='ativa')startPoll();
}

function doLogout(){
  api.post('/api/logout',{}).catch(()=>{});
  clearSession();stopPoll();renderLogin();
}

// ─── TAB: USUÁRIOS ────────────────────────────────────────────────────────────
let _uFilter='', _uSort='nome-asc', _uSel=new Set();

function tabUsuarios(){
  _uSel=new Set();
  return `
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><h3 style="font-weight:700">Membros</h3><span style="background:var(--pbg);color:var(--p);font-size:13px;font-weight:700;padding:3px 12px;border-radius:20px">${S.users.length} cadastrado${S.users.length!==1?'s':''}</span></div>

  <div class="card">
    <div class="grid2" style="gap:10px">
      <div class="field" style="margin:0"><label>Nome completo</label><input id="u-nome" class="input" placeholder="Nome completo"></div>
      <div class="field" style="margin:0">
        <label>CPF <span id="u-cpf-st" style="font-weight:400;color:#aaa;font-size:11px"></span></label>
        <input id="u-cpf" class="input" placeholder="000.000.000-00" maxlength="14">
      </div>
    </div>
    <div id="u-err" class="err-box" style="display:none;margin-top:8px"></div>
    <button class="btn btn-p" style="margin-top:10px" onclick="addUser()">+ Adicionar membro</button>
  </div>

  <div class="card">
    <p style="font-size:13px;font-weight:600;margin-bottom:8px">📥 Importar / Exportar</p>
    <p style="font-size:12px;color:#888;margin-bottom:8px">
      CSV: colunas <code>nome,cpf</code> · XLSX: mesmas colunas na linha 1.<br>
      Arquivo modelo: <code>modelo-importacao.csv</code>
    </p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <label class="btn btn-p" style="cursor:pointer">📂 CSV<input type="file" accept=".csv,.txt" style="display:none" onchange="importCSV(this)"></label>
      <label class="btn btn-p" style="cursor:pointer">📊 XLSX<input type="file" accept=".xlsx,.xls" style="display:none" onchange="importXLSX(this)"></label>
      <button class="btn" onclick="exportarCSV()">📤 Exportar CSV</button>
    </div>
    <div id="import-msg" style="display:none;margin-top:10px"></div>
  </div>

  <div class="card" style="padding:12px 14px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
      <div style="flex:1;min-width:160px">
        <label style="font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:4px">Filtrar</label>
        <input id="u-filter" class="input" placeholder="🔍 Nome ou CPF..." value="${esc(_uFilter)}"
          style="margin:0" oninput="uFiltrar(this.value)">
      </div>
      <div>
        <label style="font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:4px">Ordenar</label>
        <select id="u-sort" class="input" style="margin:0;width:auto" onchange="uOrdenar(this.value)">
          <option value="nome-asc"  ${_uSort==='nome-asc' ?'selected':''}>Nome A→Z</option>
          <option value="nome-desc" ${_uSort==='nome-desc'?'selected':''}>Nome Z→A</option>
          <option value="cpf-asc"   ${_uSort==='cpf-asc'  ?'selected':''}>CPF ↑</option>
          <option value="cpf-desc"  ${_uSort==='cpf-desc' ?'selected':''}>CPF ↓</option>
        </select>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <label style="font-size:12px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="u-chk-all" onchange="uSelTodos(this.checked)"> Selecionar todos visíveis
      </label>
      <span id="u-sel-info" style="font-size:12px;color:var(--p);font-weight:600"></span>
      <button id="u-del-btn" class="btn btn-danger btn-sm" style="display:none" onclick="uDelSel()">🗑 Excluir selecionados</button>
    </div>
  </div>

  <div id="u-list">${uRenderList()}</div>

  <div id="modal-edit" class="modal-bg" style="display:none">
    <div class="card" style="max-width:400px;width:100%">
      <h3 style="font-weight:700;margin-bottom:14px">✏️ Editar Eleitor</h3>
      <div class="field"><label>Nome</label><input id="eu-nome" class="input"></div>
      <div class="field">
        <label>CPF <span id="eu-cpf-st" style="font-weight:400;color:#aaa;font-size:11px"></span></label>
        <input id="eu-cpf" class="input" maxlength="14">
      </div>
      <div id="eu-err" class="err-box" style="display:none"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn" style="flex:1" onclick="$('modal-edit').style.display='none'">Cancelar</button>
        <button class="btn btn-p" style="flex:1" onclick="saveEditUser()">Salvar ✓</button>
      </div>
    </div>
  </div>`;
}

function uGetList(){
  const q=_uFilter.toLowerCase().trim();
  let list=q?S.users.filter(u=>u.nome.toLowerCase().includes(q)||u.cpf.includes(q)):S.users.slice();
  list.sort((a,b)=>{
    if(_uSort==='nome-asc') return a.nome.localeCompare(b.nome);
    if(_uSort==='nome-desc')return b.nome.localeCompare(a.nome);
    if(_uSort==='cpf-asc')  return a.cpf.localeCompare(b.cpf);
    if(_uSort==='cpf-desc') return b.cpf.localeCompare(a.cpf);
    return 0;
  });
  return list;
}

function uRenderList(){
  const list=uGetList();
  if(!list.length)return '<p style="color:#aaa;font-size:13px;padding:12px 0">Nenhum eleitor encontrado.</p>';
  return list.map(u=>{
    const sel=_uSel.has(u.id);
    return`<div class="u-row ${sel?'sel':''}" id="urow-${u.id}">
      <input type="checkbox" ${sel?'checked':''} onchange="uToggle('${u.id}',this.checked)" style="cursor:pointer;width:16px;height:16px;flex-shrink:0">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--pbg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--p);flex-shrink:0">${esc(u.nome[0])}</div>

        <p style="font-size:11px;color:#888">${esc(u.cpf)}</p>

function uToggle(id,chk){

async function uDelSel(){

  for(const id of ids)await api.del('/api/usuarios/'+id);

async function addUser(){
  const nome=($('u-nome').value||'').trim(),cpf=($('u-cpf').value||'').trim();
  const e=$('u-err');e.style.display='none';
  if(!nome||!cpf){e.textContent='Nome e CPF obrigatórios.';e.style.display='block';return;}
  if(!validCPF(cpf)){e.textContent='CPF inválido. Verifique os dígitos.';e.style.display='block';return;}
  const res=await api.post('/api/usuarios',{nome,cpf});
  if(res.error){e.textContent=res.error;e.style.display='block';return;}
  toast('Membro adicionado!','success');await renderTab();
}
let _editId=null;
function editUser(id){
  const u=S.users.find(x=>x.id===id);if(!u)return;
  _editId=id;
  $('eu-nome').value=u.nome;$('eu-cpf').value=u.cpf;
  $('eu-err').style.display='none';
  $('modal-edit').style.display='flex';
  cpfInput('eu-cpf','eu-cpf-st');
}
async function saveEditUser(){
  const nome=($('eu-nome').value||'').trim(),cpf=($('eu-cpf').value||'').trim();
  const e=$('eu-err');e.style.display='none';
  if(!nome||!cpf){e.textContent='Nome e CPF obrigatórios.';e.style.display='block';return;}

async function delUser(id){

async function importCSV(input){
  const file=input.files[0];if(!file)return;
  const text=await file.text(),m=$('import-msg');
  m.style.display='block';m.className='info-box';m.textContent='Importando CSV...';
  const res=await api.postTxt('/api/usuarios/importar',text);
  if(res.error){m.className='err-box';m.textContent=res.error;return;}
  const errosTxt=res.erros&&res.erros.length?' ('+res.erros.slice(0,3).join('; ')+(res.erros.length>3?'…':'')+')'  :'';
  m.className='succ-box';m.textContent='✓ '+res.added+' adicionado(s), '+res.skipped+' ignorado(s).'+errosTxt;
  toast(res.added+' membro(s) importado(s)!','success');await renderTab();
}

async function importXLSX(input){
  const file=input.files[0];if(!file)return;
  const m=$('import-msg');
  m.style.display='block';m.className='info-box';m.textContent='Importando XLSX...';
  try{
    const fd=new FormData();fd.append('file',file);
    const resp=await fetch('/api/usuarios/importar-xlsx',{method:'POST',headers:authH(),body:fd});
    const res=await resp.json();
    if(res.error){m.className='err-box';m.textContent='Erro: '+res.error;return;}
    const errosTxt=res.erros&&res.erros.length?' ('+res.erros.slice(0,3).join('; ')+(res.erros.length>3?'…':'')+')'  :'';
    m.className='succ-box';m.textContent='✓ '+res.added+' adicionado(s), '+res.skipped+' ignorado(s).'+errosTxt;
    toast(res.added+' membro(s) importado(s)!','success');await renderTab();
  }catch(e){m.className='err-box';m.textContent='Erro ao processar arquivo.';}
}

async function tabResultados(){

  const{resultados,cargos,candidatos,totalPresentes}=data;
  const html=cargos.map(cargo=>{
    const res=resultados[cargo.id]||{},branco=res.branco||0;
    const maioria=Math.ceil(totalPresentes/2);
    const rank=Object.entries(res).filter(([k])=>k!=='branco').map(([cid,v])=>{const c=candidatos.find(x=>x.id===cid);return c?{cid,c,v}:null;}).filter(Boolean).sort((a,b)=>b.v-a.v);
    const eleitos=rank.filter((r,i)=>i<cargo.vagas&&r.v>=maioria);
    return`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><h3 style="font-weight:700;font-size:16px">${esc(cargo.nome)}</h3>
        <p style="font-size:11px;color:#888">${cargo.vagas} vaga${cargo.vagas>1?'s':''} · Maioria: ${maioria} votos (50% dos ${totalPresentes} presentes)</p></div>
        <span class="badge ${eleitos.length>0?'bdg-ok':'bdg-err'}">${eleitos.length} eleito${eleitos.length!==1?'s':''}</span>
      </div><div class="divider"></div>
      ${rank.map((r,i)=>{
        const pct=totalPresentes>0?Math.round(r.v/totalPresentes*100):0,el=eleitos.some(e=>e.cid===r.cid);
        return`<div style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;color:#aaa;min-width:18px">#${i+1}</span>
            ${avHTML(r.c,30)}
            <p style="font-size:13px;font-weight:${el?700:400};flex:1">${esc(r.c.nome)}</p>
            <p style="font-size:13px;font-weight:700">${r.v}</p>
            <p style="font-size:11px;color:#888;min-width:36px;text-align:right">${pct}%</p>
            ${el?'<span class="badge bdg-ok">✓ Eleito</span>':r.v>0?'<span class="badge bdg-warn">Insuf.</span>':''}
          </div>
          <div style="height:7px;background:#eee;border-radius:4px;overflow:hidden;margin-top:5px">
            <div style="height:100%;border-radius:4px;width:${pct}%;background:${el?'#3B6D11':'var(--p)'};transition:width .6s"></div>
          </div>
        </div>`;
      }).join('')}
      ${branco>0?`<div style="margin-top:8px;padding:8px 12px;background:#f8f8f6;border-radius:8px;display:flex;align-items:center;gap:8px">
        <div style="width:30px;height:30px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">⬜</div>
        <p style="font-size:13px;color:#888;font-style:italic">Votos em branco / nulos: <strong>${branco}</strong></p>
      </div>`:''}
    </div>`;
  }).join('');
  return`<h3 style="font-weight:700;margin-bottom:14px">Resultado da Eleição</h3>
  <div style="margin-bottom:14px"><button class="btn btn-p" onclick="exportarResultado()">📊 Exportar Relatório (.xlsx)</button></div>
  ${html}`;
}

// ─── TAB: CONFIGURAÇÕES ────────────────────────────────────────────────────────
function tabConfig(){
  const c=S.config||{};
  const cr=(id,label,val)=>`
    <div class="field" style="margin:0">
      <label>${label}</label>
      <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
        <input type="color" id="${id}-p" value="${val}" style="width:38px;height:34px;border:1px solid #ccc;border-radius:6px;cursor:pointer;padding:2px">
        <input id="${id}-h" class="input" style="flex:1" value="${val}" placeholder="${val}">
      </div>
    </div>`;
  return`
  <h3 style="font-weight:700;margin-bottom:14px">⚙️ Configurações</h3>
  <div class="card" style="margin-bottom:14px">
    <p style="font-size:13px;font-weight:600;margin-bottom:12px">🏛️ Identidade</p>
    <div class="field"><label>Nome da Igreja / Instituição</label><input id="cfg-nome" class="input" value="${esc(c.nomeInstituicao||'')}"></div>
    <div class="field">
      <label>Logotipo</label>
      ${c.logoUrl?`<div style="margin-bottom:8px"><img src="${esc(c.logoUrl)}" style="max-height:60px;border-radius:8px"></div>`:''}
      <label class="btn btn-p btn-sm" style="cursor:pointer;width:fit-content">📷 Enviar logo<input type="file" accept="image/*" style="display:none" onchange="uploadLogo(this)"></label>
    </div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <p style="font-size:13px;font-weight:600;margin-bottom:12px">🎨 Cores</p>
    <div class="grid2" style="gap:12px">
      ${cr('cp','Cor primária (botões)',c.corPrimaria||'#185FA5')}
      ${cr('cs','Cor secundária (sucesso)',c.corSecundaria||'#3B6D11')}
      ${cr('cbg','Fundo',c.corFundo||'#f0ede6')}
      ${cr('ctx','Texto',c.corTexto||'#1a1a18')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
      <button class="btn btn-p" onclick="salvarConfig()">💾 Salvar</button>
      <button class="btn" onclick="resetCores()">↺ Padrão</button>
    </div>
    <div id="cfg-msg" style="display:none;margin-top:10px"></div>
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:600;margin-bottom:12px">🔐 Alterar senha do admin</p>
    <div class="grid2" style="gap:10px">
      <div class="field" style="margin:0"><label>Senha atual</label><input id="pwd-atual" class="input" type="password" autocomplete="current-password"></div>
      <div class="field" style="margin:0"><label>Nova senha (mín. 6 caracteres)</label><input id="pwd-nova" class="input" type="password" autocomplete="new-password"></div>
    </div>
    <div id="pwd-err" class="err-box" style="display:none;margin-top:8px"></div>
    <button class="btn btn-p" style="margin-top:10px" onclick="salvarSenha()">Salvar nova senha</button>
  </div>`;
}
async function uploadLogo(input){const file=input.files[0];if(!file)return;toast('Enviando...','info');const r=await api.upload('/api/config/logo','logo',file);if(r.error){toast('Erro: '+r.error,'danger');return;}toast('Logo atualizado!','success');await loadState();await renderTab();}
async function salvarConfig(){
  const nome=($('cfg-nome').value||'').trim();
  const cp=($('cp-h').value||$('cp-p').value).trim(),cs=($('cs-h').value||$('cs-p').value).trim();
  const cbg=($('cbg-h').value||$('cbg-p').value).trim(),ctx=($('ctx-h').value||$('ctx-p').value).trim();
  const m=$('cfg-msg');
  const r=await api.post('/api/config',{nomeInstituicao:nome,corPrimaria:cp,corSecundaria:cs,corFundo:cbg,corTexto:ctx});
  if(r.error){m.className='err-box';m.textContent=r.error;m.style.display='block';return;}
  m.className='succ-box';m.textContent='✓ Salvo!';m.style.display='block';
  applyTheme(r.config);toast('Configurações salvas!','success');
  setTimeout(()=>renderTab(),500);
}
function resetCores(){[['cp','#185FA5'],['cs','#3B6D11'],['cbg','#f0ede6'],['ctx','#1a1a18']].forEach(([id,v])=>{const p=$(id+'-p'),h=$(id+'-h');if(p)p.value=v;if(h)h.value=v;});}
async function salvarSenha(){
  const atual=$('pwd-atual').value,nova=$('pwd-nova').value;
  const e=$('pwd-err');e.style.display='none';
  if(!atual||!nova){e.textContent='Preencha ambos os campos.';e.style.display='block';return;}
  const r=await api.post('/api/admin/senha',{senhaAtual:atual,novaSenha:nova});
  if(r.error){e.textContent=r.error;e.style.display='block';return;}
  toast('Senha alterada!','success');$('pwd-atual').value='';$('pwd-nova').value='';
}

// ─── Bind events ──────────────────────────────────────────────────────────────
function cpfInput(inputId,statusId){
  const inp=$(inputId),st=$(statusId);if(!inp)return;
  inp.addEventListener('input',e=>{
    e.target.value=fmtCPF(e.target.value);
    const v=e.target.value,ok=validCPF(v);
    inp.classList.toggle('cpf-ok',v.replace(/\D/g,'').length===11&&ok);
    inp.classList.toggle('cpf-err',v.replace(/\D/g,'').length===11&&!ok);
    if(st)st.textContent=v.replace(/\D/g,'').length===11?(ok?'✓ válido':'✗ inválido'):'';
  });
}
function bindTabEvents(){
  cpfInput('u-cpf','u-cpf-st');
  cpfInput('eu-cpf','eu-cpf-st');
  [['cp'],['cs'],['cbg'],['ctx']].forEach(([id])=>{
    const pick=$(id+'-p'),hex=$(id+'-h');
    if(!pick||!hex)return;
    pick.addEventListener('input',e=>hex.value=e.target.value);
    hex.addEventListener('input',e=>{if(/^#[0-9a-fA-F]{6}$/.test(e.target.value))pick.value=e.target.value;});
  });
}
</script>
